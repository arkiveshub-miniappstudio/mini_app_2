<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Petty Voodoo Ritual</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-occult: #0a0a0d; 
  --ritual-altar: #141417; 
  --text-ethereal: #e2e8f0; 
  --muted-sigil: #64748b; 
  --channel-energy: #9333ea; 
  --channel-active: #a855f7; 
  --chaos-surge: #ef4444; 
  --chaos-dark: #b91c1c; 
}

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg-occult);
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: var(--text-ethereal);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(147, 51, 234, 0.08) 1.5px, transparent 1.5px);
  background-size: 36px 36px;
  pointer-events: none;
  z-index: 0;
}

.ritual-altar {
  position: relative;
  z-index: 10;
  background: var(--ritual-altar);
  backdrop-filter: blur(20px);
  border-radius: 12px; 
  padding: 3.5rem 2.8rem 4rem;
  width: min(520px, 94vw);
  text-align: center;
  box-shadow: 
    0 20px 60px rgba(0, 0, 0, 0.5), 
    inset 0 0 0 1px rgba(147, 51, 234, 0.1),
    0 0 20px rgba(147, 51, 234, 0.05);
  transition: all 0.3s ease;
}

.characters {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2rem;
  height: 200px; 
  position: relative;
}

.character-wrap { 
  position: relative; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  width: 150px; 
  height: auto;
}

.main-img {
  width: 100%;
  height: auto;
  object-fit: contain;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.6));
}

/* Subtle pulse to indicate it is clickable */
@keyframes idle-bounce { 
  0%, 100% { transform: translateY(0); filter: drop-shadow(0 8px 16px rgba(147, 51, 234, 0.2)); }
  50% { transform: translateY(-4px); filter: drop-shadow(0 12px 20px rgba(147, 51, 234, 0.5)); } 
}
.main-img { animation: idle-bounce 3.5s ease-in-out infinite; }

@keyframes sad-shake { 0%,100%{transform:rotate(0)translateY(0)}20%{transform:rotate(-3deg)translateY(-1px)}40%{transform:rotate(3deg)translateY(-1px)}60%{transform:rotate(-2deg)}80%{transform:rotate(2deg)} }
.main-img.sad { animation: sad-shake 0.5s ease !important; }

@keyframes cry-wobble { 0%,100%{transform:translateY(0)scale(1)}30%{transform:translateY(-8px)scale(1.02)}60%{transform:translateY(2px)scale(0.99)} }
.main-img.cry { animation: cry-wobble 0.6s ease forwards !important; }

/* Clickable Areas over the Image */
.clickable {
  position: absolute;
  background: rgba(147, 51, 234, 0); 
  cursor: pointer;
  z-index: 30;
  border-radius: 50%; 
  transition: all 0.2s ease;
}

#map-head { top: 12%; left: 35%; width: 30%; height: 30%; } 
#map-torso-patch { top: 40%; left: 24%; width: 20%; height: 20%; } 
#map-left-arm-patch { top: 56%; left: 10%; width: 22%; height: 22%; } 
#map-right-arm-pin { top: 50%; left: 68%; width: 18%; height: 18%; } 
#map-right-leg-pin { top: 76%; left: 60%; width: 20%; height: 20%; } 
#map-left-leg-pin { top: 79%; left: 30%; width: 20%; height: 20%; } 

.clickable:hover, .clickable.active { 
  background: rgba(147, 51, 234, 0.25); 
  box-shadow: 0 0 15px rgba(168, 85, 247, 0.6); 
}

/* Typography */
.incantation {
  font-size: clamp(1.8rem, 4.5vw, 2.4rem);
  font-weight: 800;
  color: var(--text-ethereal);
  line-height: 1.2;
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
  text-shadow: 0 0 10px rgba(147, 51, 234, 0.1);
}

.ritual-subtitle {
  font-size: 1rem;
  font-weight: 500;
  font-style: italic;
  color: var(--muted-sigil);
  margin-bottom: 2rem;
}

.energy-display {
  font-size: 1rem;
  color: var(--channel-active);
  margin-bottom: 1.5rem;
  font-weight: 600;
  min-height: 2.5em;
  text-shadow: 0 0 8px rgba(168, 85, 247, 0.3);
}

.ritual-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.4rem;
  flex-wrap: wrap;
  min-height: 60px;
}

/* Buttons */
.btn-ritual, .btn-void {
  font-family: 'Figtree', sans-serif;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.4s ease;
}

.btn-ritual {
  background: linear-gradient(135deg, #1f1f23, #0d0d0f); 
  color: var(--muted-sigil);
  font-size: 1.15rem;
  padding: 0.8em 2.5em;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(147, 51, 234, 0.1);
}

/* This class gets added via JS once a body part is clicked */
.btn-ritual.active {
  background: linear-gradient(135deg, var(--channel-energy), var(--channel-active));
  color: #fff;
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4), inset 0 1px 1px rgba(255,255,255,0.2);
}
.btn-ritual.active:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(168, 85, 247, 0.5); }
.btn-ritual.active:active { transform: translateY(1px); box-shadow: 0 3px 12px rgba(168, 85, 247, 0.3); }

.btn-void {
  background: linear-gradient(135deg, var(--chaos-surge), var(--chaos-dark));
  color: #fff;
  font-size: 0.95rem;
  padding: 0.7em 2em;
  box-shadow: 0 6px 16px rgba(239,68,68,0.25), inset 0 1px 1px rgba(255,255,255,0.3);
}
.btn-void:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239,68,68,0.3); }
.btn-void:active { transform: translateY(1px); }

/* Chaos Mode for the Cancel Button */
.btn-void.chaos { 
  position: fixed; 
  z-index: 999; 
  filter: blur(0.5px) drop-shadow(-10px 5px 15px rgba(239, 68, 68, 0.45));
  transition: top 0.15s linear, left 0.15s linear, font-size 0.4s ease, opacity 0.5s ease;
}

.float-msg {
  position: fixed;
  font-family: 'Figtree', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-ethereal);
  background: rgba(20, 20, 23, 0.9);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(147, 51, 234, 0.2);
  border-radius: 20px;
  padding: 9px 20px;
  pointer-events: none;
  z-index: 500;
  white-space: nowrap;
  opacity: 0;
  animation: floatUp 2s ease-out forwards;
}
@keyframes floatUp { 0%{opacity:0;transform:translateY(0)scale(0.85)}18%{opacity:1;transform:translateY(-12px)scale(1)}70%{opacity:1;transform:translateY(-32px)scale(1)}100%{opacity:0;transform:translateY(-56px)scale(0.95)} }

/* Celebration Overlay */
.ritual-complete {
  position: fixed; inset: 0; z-index: 800;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10, 10, 13, 0.98);
  backdrop-filter: blur(12px);
  opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
}
.ritual-complete.active { opacity: 1; pointer-events: all; }
.celeb-chars {
  display: flex; align-items: flex-end; justify-content: center;
  margin-bottom: 1.4rem;
  opacity: 0; transform: scale(0.7) translateY(30px);
  transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s;
}
.ritual-complete.active .celeb-chars { opacity: 1; transform: scale(1.1) translateY(0); }
.celeb-msg {
  font-family: 'Figtree', sans-serif;
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 800; color: var(--text-ethereal);
  text-align: center; line-height: 1.15; letter-spacing: -0.02em; padding: 0 2rem;
  opacity: 0; transform: translateY(20px);
  transition: all 0.6s ease 0.55s;
  text-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
}
.ritual-complete.active .celeb-msg { opacity: 1; transform: translateY(0); }
.celeb-sub {
  font-size: 1.1rem; font-weight: 500; font-style: italic; color: var(--muted-sigil);
  margin-top: 1rem; opacity: 0; transition: opacity 0.5s ease 1s;
}
.ritual-complete.active .celeb-sub { opacity: 1; }

.ritual-spark {
  position: fixed; pointer-events: none; z-index: 600;
  width: 6px; height: 6px; border-radius: 50%;
  animation: sparkPop 0.6s ease-out forwards;
  box-shadow: 0 0 10px currentColor;
}
@keyframes sparkPop { 0%{transform:scale(0);opacity:1}60%{transform:scale(1.8);opacity:1}100%{transform:scale(0);opacity:0} }
</style>
</head>
<body>

<div class="ritual-altar" id="mainAltar">
  <div class="characters">
    <div class="character-wrap">
      <div class="clickable" id="map-head" title="Bind The Head"></div>
      <div class="clickable" id="map-torso-patch" title="Bind The Torso Patch"></div>
      <div class="clickable" id="map-left-arm-patch" title="Bind The Left Arm Patch"></div>
      <div class="clickable" id="map-right-arm-pin" title="Bind The Right Arm Pin"></div>
      <div class="clickable" id="map-right-leg-pin" title="Bind The Right Leg Pin"></div>
      <div class="clickable" id="map-left-leg-pin" title="Bind The Left Leg Pin"></div>

      <img src="ritual_doll.png" class="main-img" id="mainImg" alt="Occult Voodoo Ritual Doll">
    </div>
  </div>

  <h1 class="incantation" id="incantation">Channel Petty Curse?</h1>
  <p class="ritual-subtitle" id="ritualSubtitle">Click A Body Part To Bind The Target</p>
  
  <p class="energy-display" id="energyDisplay"></p>
  
  <div class="ritual-actions" id="buttonsArea">
    <button class="btn-ritual" id="btnYes" onclick="clickYes()" disabled>Awaiting Target...</button>
    <button class="btn-void"  id="btnNo"  onclick="clickNo()">Purge Spell</button>
  </div>
</div>

<div class="ritual-complete" id="celebration">
  <div class="celeb-chars">
    <img src="ritual_doll.png" class="main-img" alt="Charged Occult Energy" style="animation: none;">
  </div>
  <div class="celeb-msg" id="finalCurseMsg">Petty Curse Consumed.<br>It Is Done.</div>
  <div class="celeb-sub">Some Things Were Always Going To Be This Way.</div>
</div>

<script>
let noClicks = 0, isChaos = false;
let targetBound = false;
let finalCurseText = "";

const btnNo = document.getElementById('btnNo');
const btnYes = document.getElementById('btnYes');
const question = document.getElementById('incantation');
const subtitle = document.getElementById('ritualSubtitle');
const energyDisplay = document.getElementById('energyDisplay');
const mainImg = document.getElementById('mainImg');
const finalCurseMsg = document.getElementById('finalCurseMsg');

// The Cleaned-Up Curse Dictionary
const spells = {
  'head': [
    "May they always remember a great comeback 4 hours after the argument.", 
    "May they always fall in love with a song they absolutely despise.",
    "May they confidently wave back at someone who was waving to the person behind them."
  ],
  'torso-patch': [
    "May they always wait in the exact center of the longest line.", 
    "May they feel the sudden need to use the bathroom right as their food arrives.", 
    "May they discover a strand of spaghetti in their hair during a serious meeting."
  ],
  'left-arm-patch': [
    "May their phone charger only work when held at a very specific, uncomfortable angle.", 
    "May their autocorrect change their last word to something totally absurd.", 
    "May they get a minor paper cut exactly once a week."
  ],
  'right-arm-pin': [
    "May they drop freshly applied eyeliner directly onto their most expensive shirt.", 
    "May they always get a persistent hangnail that snags on sweaters.", 
    "May they accidentally 'like' their ex's photo from 3 years ago while lurking."
  ],
  'right-leg-pin': [
    "May they step in gum right before walking onto a carpet.", 
    "May their Wi-Fi drop the exact second before a large download finishes.", 
    "May one of their shoes always be tied slightly looser than the other."
  ],
  'left-leg-pin': [
    "May they step in a tiny puddle of water immediately after putting on fresh socks.", 
    "May they subtly stub their toe on the same piece of furniture every Tuesday.", 
    "May they get a tiny pebble stuck in their shoe that they can never find."
  ]
};

// Cancel messages
const purgeMsgs = ["Are You Sure?", "Think Again...", "The Ritual Is Already Begun.", "You Do Not Mean This.", "This Is Futile.", "I Believed In Your Spite.", "Fine. Be That Way.", "Last Chance!"];
const yesSizes = [1.15, 1.35, 1.6, 1.9, 2.3, 2.8, 3.4, 4.0, 4.6, 5.2];
const noSizes  = [0.95, 0.8, 0.67, 0.56, 0.46, 0.37, 0.28, 0.2, 0.13, 0];

function anim(el, cls, dur) {
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), dur);
}

// Logic to handle clicking the doll
function bindTarget(partId, partName) {
  anim(mainImg, 'sad', 520);
  
  // Pick a random curse from the dictionary
  const curseArray = spells[partId];
  finalCurseText = curseArray[Math.floor(Math.random() * curseArray.length)];
  
  // Update the UI
  energyDisplay.textContent = `Target Bound: ${partName}. The curse is ready.`;
  
  targetBound = true;
  btnYes.textContent = "Cast Curse!";
  btnYes.classList.add('active');
  btnYes.disabled = false;
}

// Attach listeners to the doll mapping
document.getElementById('map-head').addEventListener('click', () => bindTarget('head', 'The Head'));
document.getElementById('map-torso-patch').addEventListener('click', () => bindTarget('torso-patch', 'The Torso Patch'));
document.getElementById('map-left-arm-patch').addEventListener('click', () => bindTarget('left-arm-patch', 'The Left Arm'));
document.getElementById('map-right-arm-pin').addEventListener('click', () => bindTarget('right-arm-pin', 'The Right Arm Pin'));
document.getElementById('map-right-leg-pin').addEventListener('click', () => bindTarget('right-leg-pin', 'The Right Leg Pin'));
document.getElementById('map-left-leg-pin').addEventListener('click', () => bindTarget('left-leg-pin', 'The Left Leg Pin'));

function randomPos() {
  const btnW = btnNo.offsetWidth || 80;
  const btnH = btnNo.offsetHeight || 40;
  const maxX = window.innerWidth - btnW - 40;
  const maxY = window.innerHeight - btnH - 40;
  return { 
    x: Math.max(20, Math.random() * maxX), 
    y: Math.max(20, Math.random() * maxY) 
  };
}

function jumpNo() {
  const p = randomPos();
  btnNo.style.left = p.x + 'px';
  btnNo.style.top  = p.y + 'px';
}

function spawnFloat(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-msg'; 
  el.textContent = text;
  el.style.left = Math.min(Math.max(x - 60, 12), window.innerWidth - 220) + 'px';
  el.style.top = Math.min(Math.max(y - 30, 30), window.innerHeight - 60) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

// Logic for clicking the "Purge Spell" (No) button
function clickNo() {
  noClicks++;
  const idx = Math.min(noClicks - 1, noSizes.length - 1);
  const yIdx = Math.min(noClicks - 1, yesSizes.length - 1);
  const rect = btnNo.getBoundingClientRect();
  
  spawnFloat(purgeMsgs[(noClicks - 1) % purgeMsgs.length], rect.left + rect.width / 2, rect.top);
  anim(mainImg, 'cry', 520);
  
  subtitle.textContent = noClicks >= 9 ? "Sparing Them Was Never Really An Option." : 
                         noClicks >= 6 ? "The Purge Button Is Fading Away..." : 
                         noClicks >= 4 ? "Your Resolve Is Weakening..." : 
                         "Binding holds... You Must Admit It.";
  
  // Only grow the YES button if it is active (target is bound)
  if (targetBound) {
    btnYes.style.fontSize = yesSizes[yIdx] + 'rem';
  }
  
  const nSize = noSizes[idx];
  if (nSize === 0) {
    btnNo.style.opacity = '0';
    setTimeout(() => { btnNo.style.display = 'none'; }, 550);
    subtitle.textContent = "Sparing Them Was Never Really An Option.";
    question.textContent = "Cast It.";
    anim(mainImg, 'cry', 700);
    return;
  }
  
  btnNo.style.fontSize = nSize + 'rem';
  
  if (noClicks === 5 && !isChaos) {
    isChaos = true;
    const r = btnNo.getBoundingClientRect();
    btnNo.classList.add('chaos');
    btnNo.style.left = r.left + 'px'; 
    btnNo.style.top = r.top + 'px';
    document.body.appendChild(btnNo);
  }
  
  if (isChaos) jumpNo();
}

document.addEventListener('mousemove', (e) => {
  if (!isChaos || btnNo.style.display === 'none') return;
  const r = btnNo.getBoundingClientRect();
  if (Math.hypot(e.clientX - (r.left + r.width / 2), e.clientY - (r.top + r.height / 2)) < 95) jumpNo();
});

document.addEventListener('touchmove', (e) => {
  if (!isChaos || btnNo.style.display === 'none') return;
  const t = e.touches[0], r = btnNo.getBoundingClientRect();
  if (Math.hypot(t.clientX - (r.left + r.width / 2), t.clientY - (r.top + r.height / 2)) < 120) jumpNo();
}, { passive: true });

function spawnSparkles(x, y) {
  const colors = ['#9333ea', '#a855f7', '#d8b4fe', '#000000'];
  for(let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'ritual-spark'; 
    s.style.color = colors[Math.floor(Math.random() * colors.length)];
    s.style.background = s.style.color;
    s.style.left = (x + (Math.random() - .5) * 150) + 'px';
    s.style.top = (y + (Math.random() - .5) * 150) + 'px';
    s.style.animationDelay = (Math.random() * 0.2) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

// Logic for clicking "Cast Curse!" (Yes) button
function clickYes() {
  if (!targetBound) return; // Prevent clicking if disabled
  
  isChaos = false;
  btnNo.style.display = 'none';

  const r = btnYes.getBoundingClientRect();
  spawnSparkles(r.left + r.width / 2, r.top + r.height / 2);
  
  // Set the final message in the celebration overlay
  finalCurseMsg.innerHTML = "Petty Curse Consumed.<br><br><span style='font-size: 1.5rem; font-weight: 500; color: #a855f7;'>" + finalCurseText + "</span>";
  
  setTimeout(() => document.getElementById('celebration').classList.add('active'), 400);
}
</script>

</body>
</html>
